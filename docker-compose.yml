version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ticket_db
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ticket_net

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--requirepass", "ticket_redis_pass"]
    volumes:
      - redisdata:/data
    networks:
      - ticket_net

volumes:
  pgdata:
  redisdata:

networks:
  ticket_net:
    driver: bridge
